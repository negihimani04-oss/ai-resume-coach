  <!DOCTYPE html>
<html>
<head>
  <title>AI Resume Coach</title>
   <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    textarea {
      width: 80%;
      height: 150px;
      border-radius: 10px;
      padding: 10px;
      margin-top: 20px;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    #output {
      margin-top: 30px;
      white-space: pre-line;
      text-align: left;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <h1>AI Resume Coach 🚀</h1>
  <p>Powered by Google Gemini AI</p>

  <textarea id="resume" placeholder="Paste your resume here..." rows="10" cols="50"></textarea><br><br>

  <button onclick="analyze()">Analyze</button>
  <button onclick="interview()">Generate Interview Questions</button>

  <h3>Result:</h3>
  <p id="output"></p>

  <script src="script.js"></script>
</body>
</html>
