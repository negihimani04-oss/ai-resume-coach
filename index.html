<!DOCTYPE html>
<html>
<head>
  <title>AI Resume & Interview Coach</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
      padding: 40px;
    }

    textarea {
      width: 80%;
      height: 150px;
      border-radius: 10px;
      padding: 10px;
      margin-top: 20px;
    }

    button {
      margin: 10px;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      background: #3b82f6;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    #output {
      margin-top: 30px;
      white-space: pre-wrap;
      text-align: left;
      width: 80%;
      margin-left: auto;
      margin-right: auto;
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      line-height: 1.6;
    }

    .tag {
      color: #38bdf8;
      font-size: 14px;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <h1>🚀 AI Resume & Interview Coach</h1>
  <p class="tag">Powered by Google Gemini AI</p>

  <textarea id="resume" placeholder="Paste your resume here..."></textarea><br>

  <button onclick="analyze()">Analyze Resume</button>
  <button onclick="interview()">Generate Interview Questions</button>

  <h3>Result:</h3>
  <div id="output">Your AI results will appear here...</div>

  <script src="script.js"></script>

</body>
</html>
